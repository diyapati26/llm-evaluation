# ── Locked model snapshots — alias -> dated snapshot ───────────────────────
# Model aliases (gpt-5.4-nano, claude-haiku-4-5, ...) silently remap to dated
# snapshots that can change without notice, making two runs incomparable. This
# file pins the exact snapshot each alias resolved to.
#
# Populated by `mrbench lock-snapshots` after a run: it reads the model_version
# each provider returned (recorded on every CallRecord) and writes it here.
# Commit this file alongside results so the paper cites exact snapshots.
#
# null -> not yet locked. The loader warns for any configured model with a null
# snapshot. These keys use the full `provider:model` form.

openai:gpt-5.4-nano: null
openai:gpt-5.4-mini: null
anthropic:claude-haiku-4-5: null
anthropic:claude-sonnet-4-6: null
gemini:gemini-3.5-flash: null
gemini:gemini-2.5-pro: null
