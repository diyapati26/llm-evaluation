# ── Model pricing — single source of truth ─────────────────────────
# Per-1M-token prices in USD: {input, output}. Standard (non-batch, non-cached)
# first-party API rates. Consumed by config.loader.get_price() -> providers.
#
# Verified 2026-05-30 against official pricing pages:
#   openai    : https://developers.openai.com/api/docs/pricing
#   anthropic : https://platform.claude.com/docs/en/about-claude/pricing
#   gemini    : https://ai.google.dev/gemini-api/docs/pricing
#   groq      : https://groq.com/pricing
# OpenRouter is intentionally absent — it fetches live prices from its own API.
#
# Gemini input prices below are the text/image/video tier (audio costs more).
# Gemini 2.5 Pro / OpenAI long-context tiers use the <=200k-token rate.

openai:
  gpt-5.5:       {input: 5.00, output: 30.00}   # flagship (no nano/mini variant); verified 2026-06-19
  gpt-5.4:       {input: 2.50, output: 15.00}
  gpt-5.4-mini:  {input: 0.75, output: 4.50}
  gpt-5.4-nano:  {input: 0.20, output: 1.25}
  # Not on the current pricing page — retained as legacy/unverified estimates:
  gpt-5:         {input: 5.00, output: 20.00}
  gpt-4.1:       {input: 2.00, output: 8.00}
  gpt-4.1-mini:  {input: 0.40, output: 1.60}

anthropic:
  claude-opus-4-8:            {input: 5.00, output: 25.00}   # judge model; verified 2026-06-19
