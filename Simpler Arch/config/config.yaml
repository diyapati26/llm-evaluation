# Eval config — drives every runner (standard benchmark, manipulation, moral).
#
# Models are grouped by provider; the runner flattens this into a single list
# of `provider:model` strings and dispatches via providers.conversation /
# runner.route. Add or remove models freely — no code changes needed.
#
# CLI args still work and OVERRIDE the values here. Use this file as the
# durable default; use CLI for one-off experiments.

models:
  # Add as many models per provider as you want — every runner loops over the
  # flattened list. Each entry becomes a separate row in the results JSON and
  # gets its own cache slot (cache key includes the provider prefix, so the same
  # underlying model accessed via different hosts never collides).
  openai:
    - gpt-5.4-nano
    # - gpt-5.4-nano
    # - gpt-4.1-mini

  anthropic:
    #- claude-sonnet-4-6
    - claude-haiku-4-5
    # - claude-opus-4-7

  groq:
    - openai/gpt-oss-120b
    # - openai/gpt-oss-20b
    # - meta-llama/llama-3.3-70b-versatile

  openrouter:
    # All free routes have flaky strict json_schema support — skip for now.
    # - minimax/minimax-m2.5:free  (content=None on strict mode)
    # - z-ai/glm-4.5-air:free      (returns bare int, not {answer: ...})
    # - moonshotai/kimi-k2         (Novita route rejects structured outputs)
    # - meta-llama/llama-3.3-70b-instruct  (content=None on strict mode)
    # - anthropic/claude-3.5-sonnet        (paid, would work)
    # - openai/gpt-4o-mini                 (paid, would work)

  gemini:
    #- gemini-2.5-flash
    - gemini-3.5-flash
    # - gemini-2.5-pro

# LLM judge for free-form scoring (TruthfulQA-gen, moral axes).
judge_model: gpt-5.4-mini

# ── Dataset settings ──────────────────────────────────────────────
dataset:
  random_state: 42
  max_samples: 20          # default per-dataset sample size (per subject for MMLU)
  hard_mmlu:
    - professional_medicine
    - international_law
    - college_physics
    - abstract_algebra
    - professional_law
    - college_chemistry
    - high_school_statistics
    - machine_learning
    - clinical_knowledge
    - formal_logic

# ── Standard benchmark (run_eval.py via runner.run) ──────────────
benchmark:
  datasets:
    - mmlu
    - hellaswag
    - truthfulqa_mc
    - truthfulqa_gen
  n: 100                 # paper-grade: 100/dataset; for MMLU = 100//10 = 10 per hard subject
  temperature: 0.0
  concurrency: 8         # threads in the sample loop; 1 = sequential

# ── Manipulation resistance (run_manipulation.py) ────────────────
manipulation:
  n: 30                  # paper-grade: 30//10 = 3 hard questions per subject × 10 subjects
  include_drift: true    # also run the 6-turn drift sequence
  concurrency: 6         # gentler for the burst-heavy, uncached manipulation calls
  mode: both             # stateless | stateful | both
                         #   stateless: fresh conversation per attack, ranks attack effectiveness
                         #   stateful:  chain all attacks in one conversation until the model folds
                         #   both:      run both modes (default)

# ── Moral / empathy (run_moral.py) ───────────────────────────────
moral:
  # Defaults to judge_model above unless overridden here:
  # judge_model: claude-sonnet-4-6

# Output directory for results/*.json files
results_dir: results
